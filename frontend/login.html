<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | OpportunityBoard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    
    <header>
      <nav class="navbar">
        <a href="index.html" class="nav-logo">OpportunityBoard</a>
        <ul class="nav-links">
          <li><a href="index.html">Browse</a></li>
          <li><a href="post-opportunity.html">Post</a></li>
          <li><a href="login.html" class="active">Login</a></li>
          <li><a href="signup.html" class="btn-primary">Sign Up</a></li>
        </ul>
      </nav>
    </header>

    
    <main class="page-wrapper auth-page">

      <section class="auth-card">

        <div class="auth-header">
          <h1>Welcome back</h1>
          <p>Log in to save opportunities and track your applications.</p>
        </div>

        <form class="auth-form" action="#" method="POST" novalidate>

          
          <div class="form-group">
            <label for="login-email">Email address <span class="required">*</span></label>
            <br>
            <input
              type="email"
              id="login-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <br>
          </div>
           <br>
          
          <div class="form-group">
            <label for="login-password">
              Password <span class="required">*</span>
              <a href="#" class="label-link">Forgot password?</a>
            </label>
            <br>
            
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <br>
             
          </div>
           <br>
          <button type="submit" class="btn-primary btn-full">Log In</button>

        </form>

        
        <div class="auth-divider">
          <span>or</span>
        </div>

        
        <button type="button" class="btn-oauth btn-full">
          Continue with Google
        </button>

        
        <p class="auth-switch">
          Don't have an account?
          <a href="signup.html">Sign up — it's free</a>
        </p>

      </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <p>&copy;  OpportunityBoard. Built for students, by students.</p>
    </footer>

  </body>
</html>
