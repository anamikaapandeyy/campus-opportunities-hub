<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity</title>
</head>
<body>
    <header>
      <nav class="navbar">
        <a href="index.html" class="nav-logo">OpportunityBoard</a>
        <ul class="nav-links">
          <li><a href="index.html">Browse</a></li>
          <li><a href="post-opportunity.html" class="active">Post</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="signup.html" class="btn-primary">Sign Up</a></li>
          <li><a href="saved.html">Login</a></li>
        </ul>
      </nav>
    </header>

    


    <main class="page-wrapper">
      <section class="form-section">
        <div class="form-header">
          <h1>Post an Opportunity</h1>
          <p class="form-subtitle">

            Share a hackathon, internship, or event with the community.
            Fill in the details below and hit publish.

          </p>
        </div>

        <form class="opportunity-form" action="#" method="POST" novalidate>
          <div class="form-group">
            <label for="opp-title">Opportunity Title <span class="required">*</span></label>
            <input

              type="text"
              id="opp-title"
              name="title"
              placeholder="e.g. Google Summer of Code 2025"
              required

            />
          </div>
          <br>

          <div class="form-group">

            <label for="opp-description">Description <span class="required">*</span></label>

            <textarea

              id="opp-description"
              name="description"
              rows="6"
              placeholder="Describe what this opportunity is about, what participants will gain, any key requirements, etc."
              required

            ></textarea>

          </div>
          <br>

          <div class="form-group">

            <label for="opp-category">Category <span class="required">*</span></label>
            <select id="opp-category" name="category" required>
              <option value="" disabled selected>Select a category…</option>
              <option value="hackathon">Hackathon</option>
              <option value="internship">Internship</option>
              <option value="event">Event</option>
            </select>

          </div>
          <br>
          <div class="form-row">

            <div class="form-group">
              <label for="opp-deadline">Application Deadline <span class="required">*</span></label>
              <input
                type="date"
                id="opp-deadline"
                name="deadline"
                required
              />
            </div>
            <br>
            <div class="form-group">
              <label for="opp-location">Location</label>
              <input

                type="text"
                id="opp-location"
                name="location"
                placeholder="e.g. Remote / New Delhi, IN"
              />
            </div>
            <br>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="opp-stipend">Stipend / Prize</label>
              <input

                type="text"
                id="opp-stipend"
                name="stipend"
                placeholder="e.g. ₹20,000/month or $5,000 prize"
              />

            </div>
            <br>

            <div class="form-group">
              <label for="opp-eligibility">Eligibility</label>
              <input

                type="text"
                id="opp-eligibility"
                name="eligibility"
                placeholder="e.g. Open to all undergraduates"

              />
            </div>
            <br>
          </div>

          <div class="form-group">
            <label for="opp-link">Application Link <span class="required">*</span></label>
            <input

              type="url"
              id="opp-link"
              name="application_link"
              placeholder="https://example.com/apply"
              required

            />
          </div>
          <br>

          <div class="form-actions">
            <a href="index.html" class="btn-secondary">Cancel</a>
            <br>
            <br>
            <button type="submit" class="btn-primary">Publish Opportunity</button>
          </div>
          <br>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy;  OpportunityBoard. Built for students, by students.</p>
    </footer>


</body>
</html>
